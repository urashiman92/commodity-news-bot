name: Commodity News Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEBHOOK_WHEAT: ${{ secrets.WEBHOOK_WHEAT }}
          WEBHOOK_GOLD: ${{ secrets.WEBHOOK_GOLD }}
          WEBHOOK_OIL: ${{ secrets.WEBHOOK_OIL }}
          WEBHOOK_CORN: ${{ secrets.WEBHOOK_CORN }}
          WEBHOOK_SOYBEAN: ${{ secrets.WEBHOOK_SOYBEAN }}
          WEBHOOK_COPPER: ${{ secrets.WEBHOOK_COPPER }}
          WEBHOOK_OTHER: ${{ secrets.WEBHOOK_OTHER }}
          WEBHOOK_CRITICAL: ${{ secrets.WEBHOOK_CRITICAL }}
        run: python main.py

      - name: Commit seen.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen.json
          if git diff --staged --quiet; then
            echo "✅ 変更なし、commit不要"
            exit 0
          fi
          git pull --rebase --autostash || git rebase --abort
          git commit -m "Update seen articles [skip ci]"
          for i in 1 2 3; do
            if git push; then
              echo "✅ Push成功（試行$i回目）"
              exit 0
            fi
            echo "⚠️ Push失敗、リトライ中（$i/3）..."
            sleep 2
            git pull --rebase --autostash || git rebase --abort
          done
          echo "❌ Push最終的に失敗"
          exit 1
